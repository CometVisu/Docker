name: Docker Image CI

on:
  push:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  REGISTRY_IMAGE: cometvisu/cometvisuabstractbase
  
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          - platform: linux/arm/v7
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Prepare
        id: prep
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute build args
        id: build-args
        run: |
          echo "build-date=$(date -u +'%Y-%m-%dT%H:%M:%S.%6N%:z')" >> $GITHUB_OUTPUT
          echo "git-rev=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          KNXD_REV=$(git ls-remote https://github.com/knxd/knxd.git refs/heads/debian | cut -c1-7)
          echo "knxd-git-rev=${KNXD_REV}" >> $GITHUB_OUTPUT
          KNXD_FCGI_VERSION=$(curl -sL https://raw.githubusercontent.com/CometVisu/cometvisu-knxd-fcgi/main/CMakeLists.txt | grep -oP 'VERSION\s+\K[0-9.]+')
          echo "knxd-fcgi-version=${KNXD_FCGI_VERSION}" >> $GITHUB_OUTPUT
          KNXD_FCGI_REV=$(git ls-remote https://github.com/CometVisu/cometvisu-knxd-fcgi.git refs/heads/main | cut -c1-7)
          echo "knxd-fcgi-git-rev=${KNXD_FCGI_REV}" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./CometVisuBase
          file: CometVisuBase/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.REGISTRY_IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BUILD_DATE_COMETVISUBASE=${{ steps.build-args.outputs.build-date }}
            GIT_REV_COMETVISUBASE=${{ steps.build-args.outputs.git-rev }}
            GIT_REV_KNXD=${{ steps.build-args.outputs.knxd-git-rev }}
            KNXD_FCGI_VERSION=${{ steps.build-args.outputs.knxd-fcgi-version }}
            GIT_REV_KNXD_FCGI=${{ steps.build-args.outputs.knxd-fcgi-git-rev }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest-{{date 'YYYY-MM-DD'}},enable={{is_default_branch}}
            type=raw,value=testing,enable=${{ github.ref == format('refs/heads/{0}', 'develop') }}
            type=raw,value=testing-{{date 'YYYY-MM-DD'}},enable=${{ github.ref == format('refs/heads/{0}', 'develop') }}
            

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
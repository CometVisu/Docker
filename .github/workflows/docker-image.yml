name: Docker Image CI

on:
  push:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:
      -
        name: Prepare
        id: prep
        run: |
          echo ::set-output name=build_date::$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo ::set-output name=vcs_ref::${GITHUB_SHA::8}
          echo ::set-output name=date::$(date +'%Y-%m-%d')
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push [latest]
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: ./CometVisuBase
          file: CometVisuBase/Dockerfile
          platforms: linux/amd64,linux/arm/v7,linux/arm64
          push: true
          tags: cometvisu/cometvisuabstractbase:latest,cometvisu/cometvisuabstractbase:latest-${{ steps.prep.outputs.date }}
          build-args: |
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
            VCS_REF=${{ steps.prep.outputs.vcs_ref }}
      -
        name: Build and push [testing]
        if: github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v6
        with:
          context: ./CometVisuBase
          file: CometVisuBase/Dockerfile
          platforms: linux/amd64,linux/arm/v7,linux/arm64
          push: true
          tags: cometvisu/cometvisuabstractbase:testing,cometvisu/cometvisuabstractbase:testing-${{ steps.prep.outputs.date }}
          build-args: |
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
            VCS_REF=${{ steps.prep.outputs.vcs_ref }}
